name: WinGet Submission

# Manually-gated submission of a published Windows release to the winget community
# repository (microsoft/winget-pkgs). Run this after the GitHub release contains the
# self-contained Windows ZIP assets produced by the Build & Release workflow.
#
# Requires a repository secret named WINGET_CREATE_GITHUB_TOKEN: a classic PAT from an
# account that can fork microsoft/winget-pkgs, with the public_repo scope.
# See https://aka.ms/winget-create-token.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to submit (for example, v0.8.1)'
        required: true
        type: string

permissions:
  contents: read

env:
  WINGETCREATE_VERSION: 1.12.8.0

jobs:
  submit:
    name: Submit to winget-pkgs
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+(?:\.\d+)?)$') {
            throw "Release tags must look like v1.2.3 or v1.2.3.4. Got '$tag'."
          }

          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          "PACKAGE_VERSION=$($Matches.version)" >> $env:GITHUB_ENV

      - name: Download release ZIP packages
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path packages | Out-Null
          gh release download $env:RELEASE_TAG `
            --repo ${{ github.repository }} `
            --pattern "MAUI-Sherpa.win-x64.zip" `
            --pattern "MAUI-Sherpa.win-arm64.zip" `
            --dir packages

          if (-not (Test-Path "packages/MAUI-Sherpa.win-x64.zip")) {
            throw "Missing win-x64 asset for release $env:RELEASE_TAG."
          }
          if (-not (Test-Path "packages/MAUI-Sherpa.win-arm64.zip")) {
            throw "Missing win-arm64 asset for release $env:RELEASE_TAG."
          }
          Get-ChildItem packages | Format-Table Name, Length

      - name: Generate winget manifest
        shell: pwsh
        run: |
          $manifestDir = "manifests"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null

          $replacements = @{
            "__VERSION__" = $env:PACKAGE_VERSION
            "__RELEASE_TAG__" = $env:RELEASE_TAG
            "__REPOSITORY__" = "${{ github.repository }}"
            "__X64_SHA256__" = (Get-FileHash "packages/MAUI-Sherpa.win-x64.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
            "__ARM64_SHA256__" = (Get-FileHash "packages/MAUI-Sherpa.win-arm64.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          }

          $templates = @{
            "winget/Maui.Sherpa.version.template.yaml" = "Maui.Sherpa.yaml"
            "winget/Maui.Sherpa.installer.template.yaml" = "Maui.Sherpa.installer.yaml"
            "winget/Maui.Sherpa.locale.en-US.template.yaml" = "Maui.Sherpa.locale.en-US.yaml"
          }

          foreach ($template in $templates.GetEnumerator()) {
            $content = Get-Content $template.Key -Raw
            foreach ($replacement in $replacements.GetEnumerator()) {
              $content = $content.Replace($replacement.Key, $replacement.Value)
            }
            $outputPath = Join-Path $manifestDir $template.Value
            $outputPath = Join-Path $manifestDir $template.Value
            Set-Content -Path $outputPath -Value $content -Encoding UTF8NoBOM -NoNewline
            Write-Host "Generated $outputPath"
            Write-Host $content
          }

          $validateOutput = winget validate --manifest $manifestDir 2>&1 | Out-String
          $validateExitCode = $LASTEXITCODE
          Write-Host $validateOutput
          if ($validateExitCode -ne 0) {
            throw "winget validate failed with exit code ${validateExitCode}. See output above."
          }

      - name: Submit to winget-pkgs
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            throw "The repository secret WINGET_CREATE_GITHUB_TOKEN is not configured. Add a classic PAT with public_repo scope that can fork microsoft/winget-pkgs. See https://aka.ms/winget-create-token."
          }

          winget install --id Microsoft.WingetCreate --version $env:WINGETCREATE_VERSION --exact --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install wingetcreate $env:WINGETCREATE_VERSION."
          }

          $wingetCreateCommand = Get-Command wingetcreate.exe -ErrorAction SilentlyContinue
          $wingetCreatePath = if ($null -ne $wingetCreateCommand) { $wingetCreateCommand.Source } else { $null }
          if ($null -eq $wingetCreatePath) {
            $packageRoot = Join-Path $env:LOCALAPPDATA "Microsoft\WinGet\Packages"
            if (Test-Path $packageRoot) {
              $wingetCreatePath = Get-ChildItem -Path $packageRoot -Filter wingetcreate.exe -Recurse -ErrorAction SilentlyContinue |
                Select-Object -First 1 -ExpandProperty FullName
            }
          }
          if ($null -eq $wingetCreatePath) {
            throw "wingetcreate.exe was installed but was not found on PATH."
          }

          & $wingetCreatePath submit manifests
          if ($LASTEXITCODE -ne 0) {
            throw "wingetcreate submit failed with exit code $LASTEXITCODE."
          }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MauiSherpa</title>
    <base href="/" />
    <link rel="icon" href="data:,">
    <!-- Font Awesome for Blazorise icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- App theme styles -->
    <link rel="stylesheet" href="css/app.css" />
    <!-- xterm.js for terminal rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" media="(prefers-color-scheme: light)" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #1E1E1E;
            color: #333;
        }

        body.theme-light {
            background-color: #FFFFFF;
        }

        body.theme-dark {
            background-color: #1E1E1E;
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            -webkit-tap-highlight-color: transparent;
        }

        /* Remove focus outline from non-interactive elements */
        h1, h2, h3, h4, h5, h6, p, div, span, section, article, header, main {
            outline: none;
        }

        /* Keep focus visible for interactive elements for accessibility */
        button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid #0078d4;
            outline-offset: 2px;
        }

        /* Remove default focus ring from buttons/links when clicked (not keyboard nav) */
        button:focus:not(:focus-visible), a:focus:not(:focus-visible) {
            outline: none;
        }

        #blazor-error-ui {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.75rem 1rem;
            background: #f44336;
            color: white;
            z-index: 10000;
        }

        #blazor-error-ui .error-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        #blazor-error-ui button,
        #blazor-error-ui a {
            color: white;
            font: inherit;
        }

        #blazor-error-ui button {
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
            text-decoration: underline;
        }

        #blazor-error-ui .error-details {
            max-height: 12rem;
            margin: 0.75rem auto 0;
            padding: 0.75rem;
            overflow: auto;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font: 0.75rem/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            text-align: left;
            white-space: pre-wrap;
            user-select: text;
        }

        #blazor-error-ui .dismiss {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="blazor-error-ui" data-nosnippet role="alert" aria-live="assertive">
        <div class="error-actions">
            <span>An unhandled error has occurred.</span>
            <button type="button" data-error-action="details" aria-expanded="false">Show details</button>
            <a data-error-action="report" rel="noreferrer">Report issue</a>
            <a href="." class="reload">Reload</a>
            <button type="button" class="dismiss" data-error-action="dismiss" aria-label="Dismiss error"><i class="fas fa-times"></i></button>
        </div>
        <pre class="error-details" hidden></pre>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="js/terminal.js"></script>
    <script src="js/modalInterop.js"></script>
    <script src="js/logScrollInterop.js"></script>
    <script src="js/errorInterop.js"></script>
    <script>
        window.highlightCode = function(elementId) {
            var el = document.getElementById(elementId);
            if (el) {
                delete el.dataset.highlighted;
                hljs.highlightElement(el);
            }
        };
    </script>
</body>
</html>
